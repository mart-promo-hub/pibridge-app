<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جسر باي - منصة التطوير</title>
    <!-- استدعاء مكتبة Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>مرحباً بك في جسر باي</h1>
    <button id="auth-btn">تسجيل الدخول باستخدام Pi</button>

    <script>
        // تهيئة المكتبة
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        document.getElementById('auth-btn').onclick = async () => {
            try {
                // طلب المصادقة
                const auth = await Pi.authenticate(['username'], (scopes) => {
                    console.log('Scopes granted: ' + scopes);
                });
                
                // الطريقة الصحيحة لاستخراج بيانات المستخدم من كائن الـ auth
                if (auth && auth.user) {
                    alert('أهلاً بك يا: ' + auth.user.username);
                } else {
                    alert('فشل الحصول على بيانات المستخدم');
                }
            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };
    </script>
</body>
</html>
