<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جسر باي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>مرحباً بك في جسر باي</h1>
    <button id="auth-btn">تسجيل الدخول باستخدام Pi</button>

    <script>
        const Pi = window.Pi;
        document.getElementById('auth-btn').onclick = async () => {
            try {
                const user = await Pi.authenticate(['username'], (scopes) => {
                    alert('تم الحصول على الصلاحيات: ' + scopes);
                });
                alert('أهلاً بك: ' + user.username);
            } catch (err) {
                alert('خطأ في تسجيل الدخول: ' + err);
            }
        };
    </script>
</body>
</html>
