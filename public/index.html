<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiBridge</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      window.onload = () => {
        if (window.Pi) {
          console.log("Pi SDK loaded successfully!");
        } else {
          console.warn("Pi SDK not found, please check the connection.");
        }
      };
    </script>
  </body>
</html>
