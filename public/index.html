<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جسر باي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>مرحباً بك في جسر باي</h1>
    <button id="auth-btn">تسجيل الدخول باستخدام Pi</button>

    <script>
        // 1. تهيئة المكتبة (هذا هو الجزء الذي كان مفقوداً)
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        // 2. تفعيل وظيفة زر تسجيل الدخول
        document.getElementById('auth-btn').onclick = async () => {
            try {
                // طلب المصادقة بعد التأكد من التهيئة
                const user = await Pi.authenticate(['username'], (scopes) => {
                    console.log('Scopes: ' + scopes);
                });
                alert('أهلاً بك يا: ' + user.username);
            } catch (err) {
                // عرض الخطأ للمستخدم بشكل أوضح
                alert('خطأ في الاتصال: ' + err.message);
            }
        };
    </script>
</body>
</html>
